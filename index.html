<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FairTasker - Fair Gigs, No Rip-Off Fees</title>
  <meta name="description" content="FairTasker: $5 flat claim fee. Taskers keep 100%. Better than AirTasker."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            primaryDark: '#047857',
            accent: '#8b5cf6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 font-sans antialiased">

  <header class="bg-gradient-to-r from-primary to-primaryDark text-white py-6 px-4 flex items-center justify-between shadow-lg">
    <h1 class="text-3xl font-bold">FairTasker</h1>
    <button id="themeToggle" class="px-4 py-2 rounded-lg bg-white/20 hover:bg-white/30 backdrop-blur-md transition">
      Light Mode
    </button>
  </header>

  <main class="max-w-6xl mx-auto py-12 px-4">
    <!-- Auth -->
    <section class="text-center mb-12">
      <button id="signInBtn" class="bg-primary hover:bg-primaryDark text-white px-8 py-4 rounded-xl font-semibold shadow-lg transform hover:scale-105 transition">
        Sign in with Email
      </button>
      <p id="userStatus" class="mt-6 text-xl font-medium text-primary">Not signed in</p>
    </section>

    <!-- Post Job Form -->
    <div class="bg-white dark:bg-gray-800/70 backdrop-blur-lg border border-gray-200 dark:border-gray-700 rounded-2xl shadow-2xl p-10">
      <h2 class="text-3xl font-bold mb-8 text-center text-gray-800 dark:text-gray-100">Post a Job</h2>
      <form id="jobForm" class="space-y-8">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Job Title</label>
          <input type="text" id="title" required placeholder="e.g. Move boxes from garage" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
          <textarea id="desc" rows="5" required placeholder="What needs doing? Tools? Details?" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Category</label>
            <select id="category" required class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
              <option value="">Choose one</option>
              <option value="moving">Moving</option>
              <option value="cleaning">Cleaning</option>
              <option value="handyman">Handyman</option>
              <option value="gardening">Gardening</option>
              <option value="assembly">Assembly</option>
              <option value="delivery">Delivery</option>
              <option value="tech">Tech Help</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Skill Needed</label>
            <select id="skill" required class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
              <option value="">Any</option>
              <option value="none">No experience</option>
              <option value="basic">Basic tools</option>
              <option value="power">Power tools</option>
              <option value="licensed">Licensed tradie</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Call-out Fee (min $40 AUD)</label>
            <input type="number" id="callout" min="40" step="5" required value="40" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Rate After First Hour ($25/hr min)</label>
            <input type="number" id="rate" min="25" step="5" required value="25" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Estimated Hours</label>
            <input type="number" id="hours" min="1" step="0.5" required value="3" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Postcode (for map)</label>
          <input type="text" id="postcode" placeholder="e.g. 2000" maxlength="4" class="mt-2 block w-full rounded-xl border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-primary focus:ring-primary transition">
        </div>

        <!-- Photo Upload -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Add Photos (optional)</label>
          <div id="dropZone" class="mt-2 border-2 border-dashed border-gray-400 dark:border-gray-600 rounded-xl p-8 text-center cursor-pointer hover:border-primary hover:bg-primary/10 transition backdrop-blur-sm">
            <p class="text-gray-600 dark:text-gray-400">Drag & drop or click to upload</p>
            <input type="file" id="photos" accept="image/*" multiple hidden />
          </div>
          <div id="preview" class="mt-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white py-4 rounded-xl font-bold shadow-xl transform hover:scale-105 transition duration-300">
          Post Job
        </button>
      </form>

      <p id="error" class="mt-6 text-red-500 dark:text-red-400 text-center font-medium"></p>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, signInWithEmailLink, isSignInWithEmailLink, sendSignInLinkToEmail } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2Gy0yd9sKYn_yBJmP4u6XKRW90v8NbmY",
      authDomain: "taskmate-123.firebaseapp.com",
      projectId: "taskmate-123",
      storageBucket: "taskmate-123.firebasestorage.app",
      messagingSenderId: "783596986866",
      appId: "1:783596986866:web:936b7a7127c7c96f4acb6b",
      measurementId: "G-4Z2FV4Y86H"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const signInBtn = document.getElementById('signInBtn');
    const userStatus = document.getElementById('userStatus');
    const errorMsg = document.getElementById('error');
    const dropZone = document.getElementById('dropZone');
    const photosInput = document.getElementById('photos');
    const preview = document.getElementById('preview');
    const themeToggle = document.getElementById('themeToggle');

    // Dark mode toggle
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      themeToggle.textContent = document.documentElement.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
    });

    // Sign-in
    signInBtn.addEventListener('click', async () => {
      const email = prompt('Enter your email:');
      if (!email) return;

      const actionCodeSettings = {
        url: 'https://fairtasker.vercel.app/',
        handleCodeInApp: true
      };

      try {
        await sendSignInLinkToEmail(auth, email, actionCodeSettings);
        window.localStorage.setItem('emailForSignIn', email);
        alert('Check your email for the link!');
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });

    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) email = prompt('Enter the email you used:');

      try {
        const result = await signInWithEmailLink(auth, email, window.location.href);
        window.localStorage.removeItem('emailForSignIn');
        userStatus.textContent = `Signed in as ${result.user.email}`;
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    }

    // Photo preview
    dropZone.addEventListener('click', () => photosInput.click());
    photosInput.addEventListener('change', handleFiles);

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('border-primary', 'bg-primary/10');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-primary', 'bg-primary/10'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('border-primary', 'bg-primary/10');
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      preview.innerHTML = '';
      Array.from(files || photosInput.files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'w-full h-32 object-cover rounded-lg shadow-md';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }

    // Job form submit
    document.getElementById('jobForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!auth.currentUser) {
        errorMsg.textContent = 'Sign in first to post jobs.';
        return;
      }

      errorMsg.textContent = '';

      const job = {
        title: document.getElementById('title').value,
        desc: document.getElementById('desc').value,
        category: document.getElementById('category').value,
        skill: document.getElementById('skill').value,
        callout: Number(document.getElementById('callout').value),
        rate: Number(document.getElementById('rate').value),
        hours: Number(document.getElementById('hours').value),
        postcode: document.getElementById('postcode').value,
        posterId: auth.currentUser.uid,
        status: 'open',
        createdAt: new Date(),
        photos: [] // We'll fill this with URLs after upload
      };

      try {
        await addDoc(collection(db, 'jobs'), job);
        alert('Job posted! Check your dashboard soon.');
        e.target.reset();
        preview.innerHTML = '';
      } catch (err) {
        errorMsg.textContent = 'Error posting: ' + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
